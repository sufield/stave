# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

before:
  hooks:
    - make sync-schemas sync-controls

builds:
  - id: stave
    main: ./cmd/stave
    binary: stave
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X github.com/sufield/stave/internal/version.Version=v{{ .Version }}
      - -X github.com/sufield/stave/internal/version.Commit={{ .Commit }}
      - -X github.com/sufield/stave/internal/version.Date={{ .Date }}
      - -X github.com/sufield/stave/internal/version.BuiltBy=goreleaser
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: "stave_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle"
      - "${signature}"
      - "${artifact}"

changelog:
  use: github-native

release:
  github:
    owner: sufield
    name: stave
  prerelease: auto

dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/sufield/stave:v{{ .Version }}-amd64"
    dockerfile: build/docker/Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=stave"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/sufield/stave"
  - id: arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/sufield/stave:v{{ .Version }}-arm64"
    dockerfile: build/docker/Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=stave"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/sufield/stave"

docker_manifests:
  - name_template: "ghcr.io/sufield/stave:v{{ .Version }}"
    image_templates:
      - "ghcr.io/sufield/stave:v{{ .Version }}-amd64"
      - "ghcr.io/sufield/stave:v{{ .Version }}-arm64"
  - name_template: "ghcr.io/sufield/stave:latest"
    image_templates:
      - "ghcr.io/sufield/stave:v{{ .Version }}-amd64"
      - "ghcr.io/sufield/stave:v{{ .Version }}-arm64"

brews:
  - name: stave
    repository:
      owner: sufield
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sufield/stave"
    description: "Configuration safety evaluation CLI"
    license: "Apache-2.0"
    test: |
      system "#{bin}/stave", "--version"

nfpms:
  - id: default
    package_name: stave
    vendor: sufield
    homepage: "https://github.com/sufield/stave"
    description: "Configuration safety evaluation CLI"
    license: "Apache-2.0"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

snapshot:
  version_template: "{{ .Version }}-dev.{{ .ShortCommit }}"
