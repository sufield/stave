# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

before:
  hooks:
    - make sync-schemas sync-controls

builds:
  - id: stave
    main: ./cmd/stave
    binary: stave
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X github.com/sufield/stave/internal/version.Version=v{{ .Version }}
      - -X github.com/sufield/stave/internal/version.Commit={{ .Commit }}
      - -X github.com/sufield/stave/internal/version.Date={{ .Date }}
      - -X github.com/sufield/stave/internal/version.BuiltBy=goreleaser
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "stave_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle"
      - "${signature}"
      - "${artifact}"

changelog:
  use: github-native

release:
  github:
    owner: sufield
    name: stave
  prerelease: auto

dockers_v2:
  - id: stave
    images:
      - "ghcr.io/sufield/stave"
    tags:
      - "v{{ .Version }}"
      - latest
    dockerfile: build/docker/Dockerfile.release
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "stave"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/sufield/stave"

homebrew_casks:
  - name: stave
    binaries:
      - stave
    repository:
      owner: sufield
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/sufield/stave"
    description: "Configuration safety evaluation CLI"
    caveats: |
      First, check your environment:
        stave doctor        Checks for jq, aws-cli, git, graphviz

      Get started:
        stave demo          Run a demo with bundled sample data
        stave quickstart    Auto-detect snapshots and evaluate
        stave init          Scaffold a new project

      Shell completions:
        stave completion bash > $(brew --prefix)/etc/bash_completion.d/stave
        stave completion zsh  > $(brew --prefix)/share/zsh/site-functions/_stave

      Documentation: https://github.com/sufield/stave

nfpms:
  - id: default
    package_name: stave
    maintainer: "sufield <sufield@users.noreply.github.com>"
    vendor: sufield
    homepage: "https://github.com/sufield/stave"
    description: "Configuration safety evaluation CLI"
    license: "Apache-2.0"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

snapshot:
  version_template: "{{ .Version }}-dev.{{ .ShortCommit }}"
