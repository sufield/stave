dsl_version: ctrl.v1
id: CTL.S3.VERSION.001
name: Versioning Required
description: >
  S3 buckets must have versioning enabled to protect against
  accidental deletion and enable recovery from negligent operations.
domain: exposure
severity: medium
compliance:
  hipaa: "164.312(c)(1)"
  cis_aws_v1.4.0: "2.1.3"
  soc2: "CC6.1"
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
remediation:
  description: >
    Bucket does not have versioning enabled. Objects deleted or
    overwritten cannot be recovered.
  action: >
    Enable versioning on the bucket using aws s3api put-bucket-versioning.
    Once enabled, configure lifecycle rules to manage noncurrent versions
    and control storage costs.
  example: |
    {
      "storage": {
        "kind": "bucket",
        "versioning": {
          "enabled": true
        }
      }
    }
unsafe_predicate:
  all:
    - field: properties.storage.kind
      op: eq
      value: bucket
    - field: properties.storage.versioning.enabled
      op: eq
      value: false
