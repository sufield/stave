dsl_version: ctrl.v1
id: CTL.S3.ACCESS.GRANTS.001
name: S3 Access Grants Must Not Grant Broad Permissions
description: >
  S3 Access Grants provide temporary credentials scoped to a bucket or
  prefix. An Access Grant with READWRITE permission on a broad scope
  (entire bucket or wildcard prefix) bypasses bucket policy restrictions.
domain: exposure
exposure:
  type: access_grant_scope
  principal_scope: cross_account
severity: high
compliance:
  hipaa: "164.312(a)(1)"
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
remediation:
  description: >
    An S3 Access Grant exists with broad write permissions.
  action: >
    Restrict grant scope to specific prefixes. Use READ not READWRITE.
  example: |
    { "storage": { "access_grants": { "has_broad_write_grant": false } } }
unsafe_predicate:
  all:
    - field: properties.storage.kind
      op: eq
      value: bucket
    - field: properties.storage.access_grants.instance_exists
      op: eq
      value: true
    - field: properties.storage.access_grants.has_broad_write_grant
      op: eq
      value: true
