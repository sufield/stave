dsl_version: ctrl.v1
id: CTL.S3.PUBLIC.007
name: No Public Read via Policy
description: >
  S3 bucket policies must not grant public read access.
domain: exposure
exposure:
  type: public_read_via_policy
  principal_scope: public
severity: critical
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
remediation:
  description: >
    Bucket policy grants public read (Principal \"*\" with read action).
  action: >
    Remove or constrain the public policy statement. Use restrictive
    principals or conditions and keep Public Access Block enabled.
  example: |
    {
      "storage": {
        "visibility": {
          "public_read_via_policy": false
        }
      }
    }
unsafe_predicate:
  any:
    - field: properties.storage.visibility.public_read_via_policy
      op: eq
      value: true
