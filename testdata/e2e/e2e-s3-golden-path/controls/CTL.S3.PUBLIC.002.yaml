dsl_version: ctrl.v1
id: CTL.S3.PUBLIC.002
name: No Public S3 Buckets With Sensitive Data
description: >
  S3 buckets tagged with sensitive data classifications
  (PHI, PII, confidential) must not allow any public access.
domain: exposure
exposure:
  type: public_read
  principal_scope: public
severity: critical
scope_tags:
  - aws
  - s3
  - sensitive-data
type: unsafe_state
params: {}
remediation:
  description: >
    A bucket containing sensitive data (PHI, PII, or confidential) has public
    read or list access. This data is accessible to anyone on the internet.
  action: >
    Immediately enable S3 Public Access Block (all four settings).
    Remove bucket policy statements granting access to Principal "*".
    Remove ACL grants to AllUsers or AuthenticatedUsers. Audit CloudTrail
    logs for unauthorized access during the exposure window.
  example: |
    {
      "storage": {
        "visibility": {
          "public_read": false,
          "public_list": false
        },
        "tags": {
          "data-classification": "phi"
        }
      }
    }
unsafe_predicate:
  all:
    - any:
        - field: properties.storage.visibility.public_read
          op: eq
          value: true
        - field: properties.storage.visibility.public_list
          op: eq
          value: true
    - any:
        - field: properties.storage.tags.data-classification
          op: eq
          value: phi
        - field: properties.storage.tags.data-classification
          op: eq
          value: pii
        - field: properties.storage.tags.data-classification
          op: eq
          value: confidential
