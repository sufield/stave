dsl_version: ctrl.v1
id: CTL.S3.CDN.EXPOSURE.001
name: Private Bucket Must Not Be Publicly Exposed Via CloudFront
description: >
  A bucket with Block Public Access enabled can still serve objects
  publicly through CloudFront if the bucket policy grants access to
  the cloudfront.amazonaws.com service principal. This creates a false
  sense of security — the bucket appears private but objects are
  accessible via the CloudFront distribution URL.
domain: exposure
exposure:
  type: cdn_exposure
  principal_scope: public
severity: high
compliance:
  hipaa: "164.312(a)(1)"
scope_tags:
  - aws
  - s3
  - cloudfront
type: unsafe_state
params: {}
remediation:
  description: >
    This bucket has Block Public Access enabled but serves objects publicly
    through a CloudFront distribution. PolicyStatus.IsPublic reports false
    because the policy grants access to a service principal (not "*"),
    but the end result is public access via the CDN URL.
  action: >
    1. Review whether public CDN access is intentional for this bucket.
    2. If not intentional, remove the CloudFront distribution or restrict
       it with signed URLs/cookies.
    3. If intentional, document this as an acknowledged exposure path
       and add a Stave exemption for this bucket.
  example: |
    {
      "storage": {
        "cdn_access": {
          "bucket_policy_grants_cloudfront": false
        }
      }
    }
unsafe_predicate:
  all:
    - field: properties.storage.kind
      op: eq
      value: bucket
    - field: properties.storage.controls.public_access_fully_blocked
      op: eq
      value: true
    - field: properties.storage.cdn_access.bucket_policy_grants_cloudfront
      op: eq
      value: true
