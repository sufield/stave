dsl_version: ctrl.v1
id: CTL.EXP.DURATION.001
name: Public Exposure Duration Limit
description: |
  Resources should not remain publicly accessible beyond threshold.
  DISC pattern predictability (entropy ≈ 0.0) suggests systematic drift
  rather than intentional temporary exposure.
  Derived from prc-entropy analysis: highly_structured pattern
type: unsafe_duration
severity: high
params:
  max_unsafe_duration: "24h"
  tolerance_window: "0h"
unsafe_predicate:
  any:
    - field: "properties.public"
      op: "eq"
      value: true
