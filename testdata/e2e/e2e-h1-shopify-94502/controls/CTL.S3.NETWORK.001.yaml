dsl_version: ctrl.v1
id: CTL.S3.NETWORK.001
name: Public-Principal Policies Must Have Network Conditions
description: >
  S3 bucket policies that grant access to Principal * (any AWS
  principal) must include network-scoping conditions such as
  aws:SourceIp, aws:sourceVpce, aws:SourceVpc, or
  aws:PrincipalOrgID. Without these conditions, the bucket is
  accessible to anyone on the internet. This control detects
  policies where wildcard principals are used without network
  restrictions.
domain: exposure
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
unsafe_predicate:
  all:
    - field: properties.storage.policy.effective_network_scope
      op: eq
      value: "public"
