dsl_version: ctrl.v1
id: CTL.S3.PUBLIC.002
name: No Public S3 Buckets With Sensitive Data
description: >
  S3 buckets tagged with sensitive data classifications
  (PHI, PII, confidential) must not allow any public access.
domain: exposure
scope_tags:
  - aws
  - s3
  - sensitive-data
type: unsafe_state
params: {}
unsafe_predicate:
  all:
    - any:
        - field: properties.storage.access.public_read
          op: eq
          value: true
        - field: properties.storage.access.public_list
          op: eq
          value: true
    - any:
        - field: properties.storage.tags.data-classification
          op: eq
          value: phi
        - field: properties.storage.tags.data-classification
          op: eq
          value: pii
        - field: properties.storage.tags.data-classification
          op: eq
          value: confidential
