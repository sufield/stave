dsl_version: ctrl.v1
id: CTL.S3.PUBLIC.005
name: No Latent Public Read Exposure
description: S3 buckets must not have latent public read exposure where a public mechanism
  (policy or ACL) is masked only by Public Access Block. Removing PAB would immediately
  expose the bucket.
domain: storage
scope_tags:
- aws
- s3
version: ctrl.v1
type: unsafe_state
unsafe_predicate:
  any:
  - field: properties.storage.access.latent_public_read
    op: eq
    value: true
