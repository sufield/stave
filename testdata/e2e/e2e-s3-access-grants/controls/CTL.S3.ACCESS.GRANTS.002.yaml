dsl_version: ctrl.v1
id: CTL.S3.ACCESS.GRANTS.002
name: S3 Access Grants Identity Center Must Be Attached
description: >
  When S3 Access Grants are enabled, IAM Identity Center should be
  attached to the Access Grants instance. Without Identity Center,
  grants can only target IAM principals — losing the benefit of
  centralized identity governance and SSO-based access control.
domain: governance
severity: medium
compliance: {}
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
remediation:
  description: >
    S3 Access Grants instance exists but IAM Identity Center is not
    attached. Grant management is limited to IAM principals only.
  action: >
    Associate IAM Identity Center with the Access Grants instance
    using aws s3control associate-access-grants-identity-center.
    This enables directory-based grantee resolution.
  example: |
    {
      "storage": {
        "access_grants": {
          "instance_exists": true,
          "identity_center_attached": true
        }
      }
    }
unsafe_predicate:
  all:
    - field: properties.storage.kind
      op: eq
      value: bucket
    - field: properties.storage.access_grants.instance_exists
      op: eq
      value: true
    - field: properties.storage.access_grants.identity_center_attached
      op: eq
      value: false
