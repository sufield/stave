dsl_version: ctrl.v1
id: CTL.ID.KUBE.001
name: Cluster-Admin Binding Detected
description: |
  Detects ClusterRoleBindings that bind to the cluster-admin ClusterRole.
type: unsafe_state
severity: critical
params: {}
unsafe_predicate:
  any:
    - field: "properties.binds_to_cluster_admin"
      op: "eq"
      value: true
