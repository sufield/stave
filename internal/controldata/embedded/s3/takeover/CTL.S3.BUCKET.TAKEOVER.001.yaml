dsl_version: ctrl.v1
id: CTL.S3.BUCKET.TAKEOVER.001
name: Referenced S3 Buckets Must Exist And Be Owned
description: >
  Any externally referenced S3 bucket must exist and be owned. Dangling
  references (missing or unowned buckets) enable bucket takeover and
  attacker-controlled content delivery.
domain: exposure
exposure:
  type: bucket_takeover
  principal_scope: public
severity: critical
scope_tags: [aws, s3]
type: unsafe_state
params: {}
remediation:
  description: >
    An external reference (DNS CNAME, CDN origin, or application config)
    points to an S3 bucket that does not exist or is not owned by your
    account. An attacker can claim this bucket name and serve malicious content.
  action: >
    Create the S3 bucket in your AWS account, or remove the DNS record,
    CDN origin, or application reference pointing to the unclaimed bucket.
  example: |
    {
      "s3_ref": {
        "bucket_exists": true,
        "bucket_owned": true
      }
    }
unsafe_predicate:
  any:
    - field: properties.s3_ref.bucket_exists
      op: eq
      value: false
    - field: properties.s3_ref.bucket_owned
      op: eq
      value: false
