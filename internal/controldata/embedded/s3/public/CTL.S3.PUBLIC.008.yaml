dsl_version: ctrl.v1
id: CTL.S3.PUBLIC.008
name: No Public List via Policy
description: >
  S3 bucket policies must not grant anonymous object listing.
domain: exposure
exposure:
  type: list_via_identity
  principal_scope: public
severity: critical
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
remediation:
  description: >
    Bucket policy grants public listing (Principal \"*\" with list action).
  action: >
    Remove or constrain policy statements allowing s3:ListBucket to
    anonymous principals.
  example: |
    {
      "storage": {
        "access": {
          "list_via_identity": false
        }
      }
    }
unsafe_predicate:
  any:
    - field: properties.storage.access.list_via_identity
      op: eq
      value: true
