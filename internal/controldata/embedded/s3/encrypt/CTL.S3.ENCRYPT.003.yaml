dsl_version: ctrl.v1
id: CTL.S3.ENCRYPT.003
name: PHI Buckets Must Use SSE-KMS with Customer-Managed Key
description: >
  S3 buckets tagged with data-classification=phi must use SSE-KMS
  encryption with a customer-managed key (CMK), not the default
  AWS-managed key or SSE-S3. This ensures the organization controls
  key rotation, access policies, and audit logging for PHI data
  at rest.
domain: exposure
severity: high
scope_tags:
  - aws
  - s3
  - sensitive-data
  - hipaa
type: unsafe_state
params: {}
remediation:
  description: >
    PHI bucket is not using SSE-KMS with a customer-managed key. The
    organization lacks control over key rotation, access policies, and
    audit logging for PHI data at rest.
  action: >
    Change the bucket default encryption to SSE-KMS and specify a
    customer-managed KMS key ARN. Ensure the KMS key policy grants
    access only to authorized principals. Enable KMS key rotation.
  example: |
    {
      "storage": {
        "tags": {
          "data-classification": "phi"
        },
        "encryption": {
          "algorithm": "aws:kms",
          "kms_key_id": "arn:aws:kms:us-east-1:123456789012:key/example-key-id"
        }
      }
    }
unsafe_predicate:
  all:
    - field: properties.storage.tags.data-classification
      op: eq
      value: phi
    - any:
        - field: properties.storage.encryption.algorithm
          op: ne
          value: "aws:kms"
        - field: properties.storage.encryption.kms_key_id
          op: eq
          value: ""
