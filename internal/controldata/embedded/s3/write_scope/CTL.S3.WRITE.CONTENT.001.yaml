dsl_version: ctrl.v1
id: CTL.S3.WRITE.CONTENT.001
name: S3 Signed Upload Must Restrict Content Types
description: >
  Signed upload policies must restrict allowed content types.
  Unrestricted content types enable attackers to upload SVGs with
  embedded JavaScript or HTML files, causing stored XSS when served
  from the bucket's domain.
domain: exposure
exposure:
  type: unrestricted_content_type
  principal_scope: public
severity: high
scope_tags: [aws, s3]
type: unsafe_state
params: {}
remediation:
  description: >
    Signed upload policy does not restrict content types. An attacker
    can upload arbitrary content types including image/svg+xml or
    text/html, enabling stored XSS.
  action: >
    Add an exact content-type condition to the signed upload policy
    (e.g., eq $Content-Type image/jpeg). Avoid starts-with with
    empty prefix, which allows any content type.
  example: |
    {
      "s3_upload": {
        "operation": "write",
        "content_type_restricted": true,
        "allowed_content_types": ["image/jpeg", "image/png"]
      }
    }
unsafe_predicate:
  all:
    - field: type
      op: eq
      value: "s3_upload_policy"
    - field: properties.s3_upload.operation
      op: eq
      value: "write"
    - field: properties.s3_upload.content_type_restricted
      op: eq
      value: false
