dsl_version: ctrl.v1
id: CTL.S3.GOVERNANCE.001
name: Data Classification Tag Required
description: >
  S3 buckets must have a data-classification tag. Without this tag,
  tag-conditional controls for PHI, PII, confidential data, backup
  integrity, and compliance retention cannot evaluate — the bucket
  silently passes all sensitivity-gated checks regardless of actual
  content.
domain: exposure
severity: low
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
remediation:
  description: >
    Bucket is missing the data-classification tag. Without this tag,
    sensitivity-gated controls cannot evaluate and the bucket silently
    passes all data-protection checks.
  action: >
    Add a data-classification tag to the bucket with an appropriate value
    (e.g., phi, pii, confidential, internal, public, non-sensitive).
    Update your tagging policy to require this tag on all S3 buckets.
  example: |
    {
      "storage": {
        "kind": "bucket",
        "tags": {
          "data-classification": "internal"
        }
      }
    }
unsafe_predicate:
  all:
    - field: properties.storage.kind
      op: eq
      value: bucket
    - field: properties.storage.tags.data-classification
      op: missing
      value: true
