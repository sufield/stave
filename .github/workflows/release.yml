name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: read
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: true

      - name: Validate VERSION file matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          FILE_VERSION=$(cat VERSION)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action/download-syft@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0

      - name: Run Syft
        run: syft dir:. --output spdx-json=dist/sbom.spdx.json

      - name: Sign SBOM
        working-directory: dist
        run: cosign sign-blob --yes --bundle sbom.spdx.json.sigstore.json sbom.spdx.json

      - name: Upload SBOM artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
            dist/sbom.spdx.json \
            dist/sbom.spdx.json.sigstore.json \
            --clobber

      - name: Attest provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Upload provenance to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for artifact in dist/*.tar.gz dist/*.zip; do
            [ -f "$artifact" ] || continue
            name="$(basename "$artifact")"
            digest="$(sha256sum "$artifact" | cut -d' ' -f1)"
            gh api "repos/${GITHUB_REPOSITORY}/attestations/sha256:${digest}" \
              --jq '.attestations[0].bundle' \
              > "dist/${name}.intoto.jsonl"
          done
          gh release upload "${GITHUB_REF#refs/tags/}" \
            dist/*.intoto.jsonl \
            --clobber
