dsl_version: ctrl.v1
id: CTL.S3.PUBLIC.001
name: No Public S3 Buckets
description: >
  S3 buckets must not allow public read or list access.
  Detects buckets with public access via bucket policies,
  ACLs, or missing public access block settings.
domain: exposure
scope_tags:
  - aws
  - s3
type: unsafe_state
params: {}
remediation:
  description: >
    Bucket has public read or list access enabled via policy or ACL.
    Anyone on the internet can access objects in this bucket.
  action: >
    Enable S3 Public Access Block (all four settings).
    Remove any bucket policy statements granting access to Principal "*".
    Remove any ACL grants to AllUsers or AuthenticatedUsers.
  example: |
    {
      "storage": {
        "visibility": {
          "public_read": false,
          "public_list": false
        }
      }
    }
unsafe_predicate:
  any:
    - field: properties.storage.visibility.public_read
      op: eq
      value: true
    - field: properties.storage.visibility.public_list
      op: eq
      value: true
