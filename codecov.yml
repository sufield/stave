codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 0%
    patch:
      default:
        target: 0%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "testdata/**"
  - "vendor/**"
